# skulkd configuration. Every field is optional; the values below are the
# defaults, so an empty file (or no file at all) behaves identically.
#
# NOTE: top-level scalar keys (log, heartbeat_secs) must appear BEFORE any
# [table] header — that is how TOML works.

# Log filter in RUST_LOG syntax. The RUST_LOG env var overrides this.
log = "info"

# Liveness heartbeat interval in seconds (0 disables it).
heartbeat_secs = 30

[implant]
id = "skulk-dev"
# hardware = "Raspberry Pi Zero 2 W"   # empty/omitted -> auto-detected as "os/arch"

[transport]
mode = "listen"          # "listen" (dev / USB-OTG) or "dial" (production reverse tunnel)
addr = "127.0.0.1:9000"  # bind address (listen) or controller address (dial)

[loot]
path = "skulk-loot.redb"   # redb store on disk; overridable at runtime via SKULK_LOOT

# On-device LCD (the `lcd` feature). Omitted/empty driver -> no display.
# The block below is ready for the Waveshare 1.44" LCD HAT (ST7735S, joystick
# + 3-button variant). For the 1.14" LCD Module instead, use:
#   chip = "st7789"  width = 135  height = 240  offset_x = 52  offset_y = 40
#   rotation = 90  bgr = false
#   (that panel is natively PORTRAIT even though it's used in landscape, so
#   width/height there are its native 135x240, not the on-screen 240x135 --
#   see the WIDTH/HEIGHT note below for why that distinction matters)
#
# WIDTH/HEIGHT: mipidsi's `display_size()` wants the panel's NATIVE (as if
# rotation were 0) dimensions, not the final on-screen shape -- it derives
# the rotated/final size for you from `rotation` below. The 1.44" glass is
# natively square (128x128), so this native-vs-final distinction is moot for
# it specifically -- width/height are 128/128 at any rotation.
#
# OFFSET (offset_x/offset_y): the panel's position within the ST7735S
# controller's larger 132x162 addressable framebuffer, in that same native
# (rotation-0) frame as width/height above. (2, 1), at `rotation = 90` below,
# is hardware-confirmed: it reproduces this repo's RaspyJack fork's own
# ST7735S driver (`LCD_1in44.py`'s default `LCD_X`/`LCD_Y` adjust values)
# pixel-for-pixel on the same physical HAT.
#
# ROTATION: clockwise degrees (0/90/180/270). `90` is confirmed clean on
# real hardware. `0`/`180` are NOT plain 90-degree steps away from that in
# effective offset terms -- for this chip the offset math only carries over
# unchanged within the same MADCTL row/column-swap family, so `0`/`180`
# need their own on-hardware check (and possibly `Orientation::mirrored`,
# which this driver doesn't expose yet) rather than just picking whichever
# looks closest to upright.
# [display]
# driver = "mipidsi"
# chip = "st7735s"
# width = 128
# height = 128
# offset_x = 2
# offset_y = 1
# rotation = 90
# interface = "spi"
# spi_bus = 0
# spi_cs = 0
# dc_gpio = 25
# rst_gpio = 27
# bl_gpio = 24
# bgr = true     # panel subpixel order -- 1.44"/ST7735S needs BGR (true);
                 # the 1.14"/ST7789 needs RGB (false). Wrong setting swaps
                 # red/blue.
# theme = "/opt/skulk/themes/example"
                 # optional theme directory (a theme.toml + .bmp assets):
                 # supplies the palette, the HUD slot icons, and a fallback
                 # nav map. Omitted -> built-in default (monochrome, no icons).

# On-device HUD/status band: a thin top strip compositing small keyed
# indicators that modules publish (via ctx.widget) independent of whichever
# screen is in focus -- e.g. a battery %, CPU temp, or an active alert.
# `slots` lists which slot names to show, left to right; a slot appears only
# once a module publishes a value for it, and slots not listed here are
# ignored (the band is bounded). The theme maps each slot name to an icon
# (an [assets] entry whose key equals the slot name); with no theme, or no
# matching asset, the slot shows as text only. Empty/omitted -> no band.
# [hud]
# slots = ["battery", "temp", "ports"]

# Physical buttons/indicators wired to the device — surfaced in the Manifest
# and consulted by the LCD's navigation. Repeat [[peripherals]] per pin.
# GPIO numbers below are the Waveshare joystick + 3-button LCD HAT's actual
# BCM wiring (5-way joystick + 3 side keys). The joystick covers all 4
# directions -- up/down/left/right -- plus press (select); back lives on a
# side key (KEY3) instead, since right is now its own action. Left/Right
# only matter once a Form (spinner input) is open -- they move the cursor
# between fields/edit points without submitting or cancelling, unlike
# Select/Back at their ends; the menu itself ignores them. KEY1 (gpio 21)
# and KEY2 (gpio 20) aren't bound to anything yet -- there's no 7th nav
# action today, but they're there for a future one.
# Any single bound button will open the on-device menu; a full up/down/
# select/back set (as mapped in [nav] below) is what makes it fully usable.
# [[peripherals]]
# name = "btn_up"
# kind = "button"
# gpio = [6]
#
# [[peripherals]]
# name = "btn_down"
# kind = "button"
# gpio = [19]
#
# [[peripherals]]
# name = "btn_left"
# kind = "button"
# gpio = [5]
#
# [[peripherals]]
# name = "btn_right"
# kind = "button"
# gpio = [26]
#
# [[peripherals]]
# name = "btn_select"
# kind = "button"
# gpio = [13]
#
# [[peripherals]]
# name = "btn_back"
# kind = "button"
# gpio = [16]
#
# Optional: an LED wired by the operator (not part of the Waveshare HAT) --
# pick any free GPIO not listed above.
# [[peripherals]]
# name = "led_alert"
# kind = "indicator"
# gpio = [23]

# Operator override of the LCD's button -> nav-action mapping. Highest
# precedence, above whatever the active theme's own [nav] declares (no
# theme is loaded from disk yet, so today this is the only layer that binds
# anything). One of "up"/"down"/"left"/"right"/"select"/"back" per
# peripheral name.
# [nav]
# btn_up = "up"
# btn_down = "down"
# btn_left = "left"
# btn_right = "right"
# btn_select = "select"
# btn_back = "back"
